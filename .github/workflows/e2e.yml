name: Playwright E2E Tests

on:
  schedule:
    - cron: "45 11 * * *" # Every day at 5:15pm IST (11:45 UTC)
    - cron: "50 11 * * *" # Every day at 5:20pm IST (11:50 UTC)
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests and create JSON report
        run: npx playwright test --reporter=json > test-results.json; exit 0

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: test-results.json

      - name: Notify Slack with custom structure
        if: always()
        run: |
          PIPELINES="Login\nLogout\nAwards\nFeed page"
          if jq '.suites[].specs[].tests[] | select(.status != "passed")' test-results.json | grep -q 'status'; then
            ERRORS=$(jq -r '.suites[].specs[].tests[] | select(.status != "passed") | "- *Test*: \(.title)\n  *Error*: \(.error?.message // "See report")\n"' test-results.json)
            STATUS=":x: FAIL"
          else
            ERRORS="All tests passed. :white_check_mark:"
            STATUS=":white_check_mark: PASS"
          fi

          PAYLOAD="{
            \"blocks\": [
              {\"type\": \"section\", \"text\": {\"type\": \"mrkdwn\", \"text\": \"*Playwright Results:* $STATUS\"}},
              {\"type\": \"divider\"},
              {\"type\": \"section\", \"text\": {\"type\": \"mrkdwn\", \"text\": \"*Test Scenarios Checked:*\n$PIPELINES\"}},
              {\"type\": \"divider\"},
              {\"type\": \"section\", \"text\": {\"type\": \"mrkdwn\", \"text\": \"*Test Results:*\n$ERRORS\"}},
              {\"type\": \"divider\"},
              {\"type\": \"context\", \"elements\": [{\"type\": \"mrkdwn\", \"text\": \"<${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}|View Full Run on GitHub Actions>\"}] }
            ]
          }"
          curl -X POST -H 'Content-type: application/json' --data "$PAYLOAD" $SLACK_WEBHOOK_URL
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
