name: Nightly E2E Tests

on:
  schedule:
    - cron: "0 2 * * *" # 2:00am UTC
    - cron: "53 16 * * *" # 10:23pm IST (16:53 UTC)
    - cron: "54 16 * * *" # 10:24pm IST (16:54 UTC)

  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to test"
        required: true
        default: "alpha"
        type: choice
        options:
          - alpha
          - prod
      test_suite:
        description: "Test suite to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - auth
          - awards
          - badges
          - feed
          - smoke

jobs:
  nightly-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    env:
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      VITE_STAGE_NAME: ${{ github.event.inputs.environment || 'alpha' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Create test results directory
        run: mkdir -p test-results

      - name: Determine test pattern
        id: test-pattern
        run: |
          case "${{ github.event.inputs.test_suite || 'all' }}" in
            "auth") echo "pattern=tests/auth/" >> $GITHUB_OUTPUT ;;
            "awards") echo "pattern=tests/awards/" >> $GITHUB_OUTPUT ;;
            "badges") echo "pattern=tests/badges/" >> $GITHUB_OUTPUT ;;
            "feed") echo "pattern=tests/feed/" >> $GITHUB_OUTPUT ;;
            "smoke") echo "pattern=tests/auth/login.spec.ts" >> $GITHUB_OUTPUT ;;
            *) echo "pattern=tests/" >> $GITHUB_OUTPUT ;;
          esac

      - name: Run Playwright tests
        run: |
          npx playwright test ${{ steps.test-pattern.outputs.pattern }} \
            --project=${{ matrix.browser }} \
            --reporter=html,json:test-results/results-${{ matrix.browser }}.json \
            --output-dir=test-results/${{ matrix.browser }}
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-results-${{ matrix.browser }}
          path: |
            test-results/
            playwright-report/
          retention-days: 14

  summarize-results:
    runs-on: ubuntu-latest
    needs: nightly-tests
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-results

      - name: Summarize test results
        id: summary
        run: |
          total_passed=0
          total_failed=0
          total_skipped=0
          browsers_tested=""

          for browser in chromium firefox webkit; do
            if [ -f "all-results/nightly-results-$browser/results-$browser.json" ]; then
              passed=$(jq '[.suites[].specs[].tests[] | select(.status == "passed")] | length' "all-results/nightly-results-$browser/results-$browser.json")
              failed=$(jq '[.suites[].specs[].tests[] | select(.status == "failed")] | length' "all-results/nightly-results-$browser/results-$browser.json")
              skipped=$(jq '[.suites[].specs[].tests[] | select(.status == "skipped")] | length' "all-results/nightly-results-$browser/results-$browser.json")
              
              total_passed=$((total_passed + passed))
              total_failed=$((total_failed + failed))
              total_skipped=$((total_skipped + skipped))
              browsers_tested="$browsers_tested $browser"
            fi
          done

          echo "total_passed=$total_passed" >> $GITHUB_OUTPUT
          echo "total_failed=$total_failed" >> $GITHUB_OUTPUT
          echo "total_skipped=$total_skipped" >> $GITHUB_OUTPUT
          echo "browsers_tested=$browsers_tested" >> $GITHUB_OUTPUT

          if [ $total_failed -gt 0 ]; then
            echo "overall_status=failed" >> $GITHUB_OUTPUT
          else
            echo "overall_status=passed" >> $GITHUB_OUTPUT
          fi

      - name: Send detailed Slack notification
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              "text": "Nightly E2E Test Results",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "${{ steps.summary.outputs.overall_status == 'passed' && '🌙✅' || '🌙❌' }} Nightly E2E Test Results"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Test Suite:* ${{ github.event.inputs.test_suite || 'all' }}\n*Environment:* ${{ github.event.inputs.environment || 'alpha' }}\n*Browsers:* ${{ steps.summary.outputs.browsers_tested }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Passed:*\n${{ steps.summary.outputs.total_passed }} ✅"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Failed:*\n${{ steps.summary.outputs.total_failed }} ❌"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Skipped:*\n${{ steps.summary.outputs.total_skipped }} ⏭️"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Overall:*\n${{ steps.summary.outputs.overall_status == 'passed' && 'PASSED' || 'FAILED' }}"
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Full Report"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
