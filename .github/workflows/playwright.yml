name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      USER_BASE_URL: http://localhost:5173

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Vite and Playwright tests
        run: npm run test:e2e:ci

      - name: Save Test Output for Slack
        if: always()
        id: testlog
        run: |
          cat playwright-test.log || true
          tail -n 30 playwright-test.log > playwright-test-slack.log || true
          LOG=$(cat playwright-test-slack.log | tail -c 3500)
          # Escape for GitHub Actions multiline env
          LOG="${LOG//%/%25}"
          LOG="${LOG//$'\n'/%0A}"
          LOG="${LOG//$'\r'/%0D}"
          echo "LOG=$LOG" >> $GITHUB_OUTPUT
        shell: bash

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Send Slack Notification
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
          SLACK_MESSAGE: |
            *📣 Playwright Tests Result:* `${{ job.status }}`
            🧪 *Workflow:* ${{ github.workflow }}
            🔁 *Commit:* ${{ github.sha }}
            📦 *Repo:* ${{ github.repository }}
            🔗 <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run Logs>
            ```
            ${{ steps.testlog.outputs.LOG }}
            ```
