name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Vite and Playwright tests
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Send Slack Notification
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
          SLACK_MESSAGE: |
            *${{ job.status == 'success' && ':white_check_mark:' || ':x:' }} Playwright Tests Result:* `${{ job.status }}`
            *Workflow:* `${{ github.workflow }}`
            *Repo:* `${{ github.repository }}`
            *Commit:* `${{ github.sha }}`
            *Run Logs :arrow_down:*
            ```
            ${{ steps.testlog.outputs.LOG }}
            ```
            <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Full Run Details>
